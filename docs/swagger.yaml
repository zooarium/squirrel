basePath: /
definitions:
  internal_category.Category:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      status:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    required:
    - name
    type: object
  internal_category.CreateCategoryRequest:
    properties:
      name:
        type: string
      status:
        enum:
        - 0
        - 1
        type: integer
      user_id:
        type: integer
    required:
    - name
    - user_id
    type: object
  internal_category.UpdateCategoryRequest:
    properties:
      name:
        type: string
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - name
    type: object
  internal_transaction.CreateTransactionRequest:
    properties:
      amount:
        type: number
      category_id:
        type: integer
      type:
        enum:
        - income
        - expense
        type: string
      user_id:
        type: integer
    required:
    - amount
    - type
    - user_id
    type: object
  internal_transaction.Transaction:
    properties:
      amount:
        type: number
      category_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      type:
        description: income, expense
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  internal_transaction.UpdateTransactionRequest:
    properties:
      amount:
        type: number
      category_id:
        type: integer
      type:
        enum:
        - income
        - expense
        type: string
    required:
    - amount
    - type
    type: object
  vyaya_internal_platform_render.Response:
    properties:
      data: {}
      error:
        type: string
      status:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is a microservice for expense management.
  title: Vyaya API
  version: "1.0"
paths:
  /categories:
    get:
      description: Get a list of all categories
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/vyaya_internal_platform_render.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_category.Category'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/vyaya_internal_platform_render.Response'
      summary: List all categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Create a new category with the provided name and user ID
      parameters:
      - description: Category object
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/internal_category.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/vyaya_internal_platform_render.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_category.Category'
