      - categories
  /health:
    get:
      description: Get the health status of the service
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/vyaya_internal_platform_render.Response'
      summary: Check service health
      tags:
      - health
  /transactions:
    get:
      description: Get a list of all transactions
