        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/vyaya_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/vyaya_internal_platform_render.Response'
      summary: Create a new category
      tags:
      - categories
  /categories/{id}:
    delete:
      description: Delete a category by its ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/vyaya_internal_platform_render.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/vyaya_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/vyaya_internal_platform_render.Response'
      summary: Delete category by ID
      tags:
      - categories
    get:
      description: Get a single category by its ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/vyaya_internal_platform_render.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_category.Category'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/vyaya_internal_platform_render.Response'
        "404":
          description: Not Found
