            $ref: '#/definitions/vyaya_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/vyaya_internal_platform_render.Response'
      summary: Get category by ID
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Update an existing category with the provided name and status
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Category object
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/internal_category.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/vyaya_internal_platform_render.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_category.Category'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/vyaya_internal_platform_render.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/vyaya_internal_platform_render.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/vyaya_internal_platform_render.Response'
